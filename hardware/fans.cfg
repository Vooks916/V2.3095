[heater_fan hotend_fan]
pin: EBB:PD2
tachometer_pin: EBB:PA4
max_power: 1.0
kick_start_time: 0.100
heater: extruder
heater_temp: 50.0
shutdown_speed: 0.0

[fan]
pin: EBB:PD3
kick_start_time: 0.100
cycle_time: 0.010
shutdown_speed: 0.0

[fan]
pin: EBB:PA5
kick_start_time: 0.100
cycle_time: 0.010
shutdown_speed: 0.0

[multi_pin controller_fan_pins]
pins: PA8,PE5

[controller_fan controller_fan]
pin=multi_pin:controller_fan_pins
stepper: stepper_x, stepper_y, stepper_z
fan_speed: 0.5
kick_start_time: 0.5
idle_speed: 0.4
idle_timeout: 20
min_power: 0.12